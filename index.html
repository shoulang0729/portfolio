<!-- フォールバック JS：旧版 portfolio.js でもヒートマップが描画されるよう保証 -->
<script>
(function () {
  var tries = 0;
  var MAX = 30;

  function getW() {
    var wrap = document.getElementById('heatmap-wrap');
    if (!wrap) return 0;
    return wrap.clientWidth || wrap.getBoundingClientRect().width || 0;
  }

  function retryHeatmap() {
    tries++;
    var svg = document.getElementById('heatmap');
    if (!svg) { if (tries < MAX) setTimeout(retryHeatmap, 100); return; }
    if (svg.children.length > 0) return; // 描画済み
    var W = getW();
    if (W > 0 && typeof renderHeatmap === 'function') {
      renderHeatmap();
      return;
    }
    if (tries < MAX) { setTimeout(retryHeatmap, 100); return; }
    // 最終手段：W=0 のまま強制実行
    if (typeof renderHeatmap === 'function') renderHeatmap();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(retryHeatmap, 50);
      setTimeout(retryHeatmap, 500);
    });
  } else {
    setTimeout(retryHeatmap, 0);
    setTimeout(retryHeatmap, 300);
  }

  // 画面回転・リサイズ時にも再試行
  window.addEventListener('resize', function () {
    var svg = document.getElementById('heatmap');
    if (svg && svg.children.length === 0) { tries = 0; retryHeatmap(); }
  });
}());
</script>
