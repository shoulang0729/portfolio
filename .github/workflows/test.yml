name: Tests

on:
  push:
    branches: [main, "claude/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test          # vitest (pure function tests)
      - run: npm run lint      # eslint
      - run: npm run check:types     # tsc --checkJs (opt-in via // @ts-check)
      - run: npm run check:circular  # madge (circular dependency check)
      - run: npm run build     # esbuild
      - name: Check dist size
        run: |
          # GitHub Pages 配信バンドルの肥大化検知ガード（#314）。
          # 固定の技術制約ではなく、現状のアプリ規模に合わせた運用上の目安。
          # タブ・機能追加で多少増えるのは妥当なので、急増時の気付き用に余裕を持たせる。
          SIZE=$(stat -c%s dist/app.js 2>/dev/null || stat -f%z dist/app.js)
          BLOAT_GUARD_LIMIT=305000   # 約298KiB（運用目安・2026-06 Value/Risk/triggers＋D-1 ストレス/D-6 地域カード追加で引き上げ）
          echo "dist/app.js size: $SIZE bytes (guard: $BLOAT_GUARD_LIMIT)"
          if [ "$SIZE" -gt "$BLOAT_GUARD_LIMIT" ]; then
            echo "::error::dist/app.js exceeded bloat guard ($SIZE > $BLOAT_GUARD_LIMIT) — 肥大化を確認してください"
            exit 1
          fi
