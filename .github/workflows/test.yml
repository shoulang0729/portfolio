name: Tests

on:
  push:
    branches: [main, "claude/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm test          # vitest (pure function tests)
      - run: npm run lint      # eslint
      - run: npm run check:types     # tsc --checkJs (opt-in via // @ts-check)
      - run: npm run check:circular  # madge (circular dependency check)
      - run: npm run build     # esbuild
      - name: Check dist size
        run: |
          SIZE=$(stat -c%s dist/app.js 2>/dev/null || stat -f%z dist/app.js)
          LIMIT=180000
          echo "dist/app.js size: $SIZE bytes (limit: $LIMIT)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::dist/app.js exceeded size limit ($SIZE > $LIMIT)"
            exit 1
          fi
