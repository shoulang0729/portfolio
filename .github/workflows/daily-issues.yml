name: Daily Issues Auto-Fix

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 21:00 UTC（前日）= 6:00 JST
  workflow_dispatch:        # 手動実行（テスト用）

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete old auto-fix branches
        run: |
          gh api repos/${{ github.repository }}/branches --paginate --jq '.[].name' \
            | grep '^auto-fix/' \
            | while read branch; do
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${branch}" && \
                  echo "Deleted branch: ${branch}" || true
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch open issues
        run: |
          gh issue list --state open --json number,title,body,labels --limit 50 > open-issues.json
          echo "Open issues: $(python3 -c 'import json; print(len(json.load(open("open-issues.json"))))')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code to fix issues
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-sonnet-4-6
          allowed_tools: "Read,Write,Edit,MultiEdit,Glob,Grep,LS,TodoWrite"
          direct_prompt: |
            ワークスペースの `open-issues.json` に現在の GitHub open issues が保存されています。
            このファイルを読んで以下の手順で処理してください。

            ## Step 1: issues を評価
            `open-issues.json` を読む。空配列なら `.fix-manifest.json` を
            `{"processed":[],"skipped":[]}` として書いて終了。

            各 issue について判断する：
            - **"Wait" ラベルが付いている** → skipped に `{"number":<n>,"title":"<t>","reason":"Wait ラベル"}` を追加してスキップ
            - **実装可能** → Step 2 へ（processed に追加予定）
            - **要件が曖昧・破壊的変更・承認が必要** → skipped に `{"number":<n>,"title":"<t>","reason":"<具体的な理由>"}` を追加してスキップ

            ## Step 2: 各 issue を実装
            実装可能な issue を1件ずつコードを修正・追加する。
            - 実装できなかった issue は skipped に追加する（reason に理由を記入）
            - 実装成功したら processed に `{"number":<n>,"title":"<t>","summary":"<実装内容1行概要>"}` を追加する

            ## 注意事項
            - index.html の `?v=` バージョンを上げる（YYYYMMDD + 連番、例: 20260530A）
            - sw.js の CACHE は index.html の `?v=` から動的生成されるため変更不要
            - 破壊的な変更は行わない
            - git / npm / gh コマンドは一切実行しないこと（実行しても失敗します）
            - ファイル編集のみ行い、最後に `.fix-manifest.json` を書いて終了すること

            ## Step 3: マニフェスト書き出し
            処理結果を `.fix-manifest.json` として書き出す（JSON のみ、コードブロック不要）：
            ```
            {
              "processed": [
                {"number": 123, "title": "issue タイトル", "summary": "実装内容の概要"}
              ],
              "skipped": [
                {"number": 124, "title": "issue タイトル", "reason": "スキップ理由"}
              ]
            }
            ```

      - name: Run tests, commit, push and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # マニフェストが存在するか確認
          if [ ! -f .fix-manifest.json ]; then
            echo "::warning::No .fix-manifest.json found — Claude Code may have failed"
            exit 0
          fi

          echo "=== Manifest ===" && cat .fix-manifest.json

          PROCESSED_COUNT=$(python3 -c 'import json; print(len(json.load(open(".fix-manifest.json"))["processed"]))')
          SKIPPED_COUNT=$(python3 -c 'import json; print(len(json.load(open(".fix-manifest.json"))["skipped"]))')
          echo "Processed: $PROCESSED_COUNT, Skipped: $SKIPPED_COUNT"

          # スキップした issue にコメント（Wait ラベルは静かにスキップ）
          python3 - <<'PYEOF'
          import json, subprocess
          data = json.load(open(".fix-manifest.json"))
          for item in data.get("skipped", []):
              reason = item.get("reason", "")
              if reason == "Wait ラベル":
                  continue
              body = f"⚠️ **自動修正をスキップしました**\n\n理由: {reason}\n\n対応が必要な場合は手動で確認・承認してください。"
              subprocess.run(
                  ["gh", "issue", "comment", str(item["number"]), "--body", body],
                  check=False
              )
          PYEOF

          if [ "$PROCESSED_COUNT" -eq 0 ]; then
            echo "No issues processed — skipping PR creation"
            exit 0
          fi

          # テスト実行
          echo "=== Running tests ==="
          if ! npm test; then
            echo "::error::Tests failed — aborting PR creation"
            exit 1
          fi

          # ブランチ作成・コミット・プッシュ
          BRANCH="auto-fix/$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add -A
          git status --short

          COMMIT_MSG=$(python3 - <<'PYEOF'
          import json
          data = json.load(open(".fix-manifest.json"))
          lines = ["fix: daily auto-fix $(date +%Y-%m-%d)", ""]
          for item in data["processed"]:
              lines.append(f"- #{item['number']}: {item.get('summary', item['title'])}")
          print("\n".join(lines))
          PYEOF
          )

          git commit -m "$COMMIT_MSG"
          git push -u origin "$BRANCH"

          # PR body 生成
          PR_BODY=$(python3 - <<'PYEOF'
          import json
          data = json.load(open(".fix-manifest.json"))
          lines = ["## 対応 Issues", ""]
          for item in data["processed"]:
              lines.append(f"- #{item['number']}: {item['title']} — {item.get('summary', '')}")
          lines.append("")
          for item in data["processed"]:
              lines.append(f"Closes #{item['number']}")
          print("\n".join(lines))
          PYEOF
          )

          gh pr create \
            --title "[Auto] Daily issues fix $(date +%Y-%m-%d)" \
            --body "$PR_BODY"
