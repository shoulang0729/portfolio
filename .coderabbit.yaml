language: ja-JP
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
    ignore_title_keywords:
      - "docs:"
      - "chore(docs)"
    path_filters:
      - "!**/*.md"
      - "!docs/**"
      - "!CLAUDE.md"
      - "!README.md"
      - "!CHANGELOG.md"
chat:
  auto_reply: true
